name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Test
        run: bun run test

      - name: Build electron-vite
        run: bun run build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SECTION=$(awk -v tag="## [${TAG}]" '
            index($0, tag) == 1 { found = 1 }
            found && /^## \[/ && index($0, tag) != 1 { found = 0 }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<CHANGELOG_EOF"
              echo "$SECTION"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Releases (with changelog)
        if: steps.changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Releases (auto notes fallback)
        if: steps.changelog.outputs.found == 'false'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
